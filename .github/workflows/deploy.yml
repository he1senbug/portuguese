name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Inject Firebase Config
        run: |
          sed -i "s/REPLACE_API_KEY/${{ secrets.FIREBASE_API_KEY }}/g" src/environments/firebase.config.ts
          sed -i "s/REPLACE_AUTH_DOMAIN/${{ secrets.FIREBASE_AUTH_DOMAIN }}/g" src/environments/firebase.config.ts
          sed -i "s/REPLACE_PROJECT_ID/${{ secrets.FIREBASE_PROJECT_ID }}/g" src/environments/firebase.config.ts
          sed -i "s/REPLACE_STORAGE_BUCKET/${{ secrets.FIREBASE_STORAGE_BUCKET }}/g" src/environments/firebase.config.ts
          sed -i "s/REPLACE_MESSAGING_SENDER_ID/${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}/g" src/environments/firebase.config.ts
          sed -i "s/REPLACE_APP_ID/${{ secrets.FIREBASE_APP_ID }}/g" src/environments/firebase.config.ts

      - name: Build Angular App
        # Adjust base href if deploying to a subfolder (e.g. /portuguese/)
        # If deploying to a root custom domain, remove the --base-href flag
        run: npm run build -- --base-href /portuguese/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/portuguese-pt/browser
          cname: ${{ secrets.CUSTOM_DOMAIN }} # Optional: only if using custom domain
